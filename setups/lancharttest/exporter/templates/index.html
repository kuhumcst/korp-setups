<!DOCTYPE html>
<html>
    <head>
        <title>Download data</title>
        <style>
            #content {
                font-family: Helvetica, Arial;
                width: 500px;
                margin: 50px auto;
            }
            table {
              border-collapse: collapse;
            }

            td {
              border: 1px solid #444444;
              text-align: left;
              padding: 5px 8px;
            }
            td:first-child {
              background-color: whitesmoke;
              font-weight: bold;
            }
            .small-info {
                font-size: .75em;
            }
            #download-section {
                display: flex;
                align-items: center;
            }
            #download-button {
                width: 115px;
                margin-right: 10px;
            }
            #progress-container {
                display: flex;
                display: none;
                align-items: center;
            }
            #label-small {
                width: 115;
                font-size: 10px;
                margin-right: 5px;
            }
            #label-small > span {
                display: inline-block;
            }
            #download-label {
                width: 70px;
            }
            #progress-val {
                font-size: 10px;
                width: 30px;
                text-align: right;
            }
            #warning {
                color: #400;
                background-color: #fcc;
                border: 1px solid #a00;
                border-radius: 3px;
                padding: 6px 10px;
                margin-top: 10px;
                font-size: 12px;
            }

            #progress-bar {
                border: 1px solid grey;
                height: 7px;
                width: 200px;
                box-sizing: border-box;
                border-radius: 4px;
                background-color: whitesmoke;
            }
            #progress-bar::-moz-progress-bar {
                background: #AAAAAA;
            }
            #progress-bar::-webkit-progress-bar {
                border-radius: 4px;
                background-color: whitesmoke;
            }
            #progress-bar::-webkit-progress-value {
                background-color: #AAAAAA;
            }

        </style>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
        <script src="{{ url_for('static', filename='filedownload.js') }}"></script>

        <script>
            function addInfoText() {
                // Get number of rows about to be downloaded and other info from URL.
                let params = new URLSearchParams(window.location.search);
                let rows_to_download = parseInt(params.get('hits_display'), 10);
                let cqp_query = decodeURIComponent(params.get('cqp'));
                const max_rows_to_download = 1000;
                // Construct info text.
                let infotext = "<table class=\"small-info\">";
                infotext += "<tr><td>CQP-søgning</td><td>" + cqp_query + "</td></tr>";
                infotext += "<tr><td>Rækker i resultat</td><td>" + rows_to_download + "</td></tr>";
                infotext += "</table>";
                if (rows_to_download > max_rows_to_download) {
                    infotext += "<p>Klik her for at downloade. Der er over " + max_rows_to_download + " rækker, så downloaden vil tage en rum tid. Luk ikke dette vindue før downloaden er færdig.</p>";
                }
                else {
                    infotext += "<p>Klik her for at downloade.</p>";
                }
                document.getElementById('download-info').innerHTML = "<div>" + infotext + "</div>";
            }
        </script>
        <script>
            $(document).ready(function() {
                // Generate info text
                addInfoText();

                // Set up websocket for listening for download progress - in the "status" namespace
                var socket = io.connect('http://' + document.domain + ':' + location.port + '/status');
                socket.on('connect', function() {
                    console.log('Connected to server');
                });

                socket.on('disconnect', function() {
                    console.log('Disconnected from server');
                });

                socket.on('error', function(error) {
                    console.error('Socket Error:', error);
                });

                // Add click event handler to download button
                $('#download-button').click(function() {
                    downloadButtonClick(socket);
                });
            });
        </script>
    </head>
    <body>
    <div id="content">
        <h1>Download data</h1>
        <div id="download-info"></div>
        <div id="download-section">
            <div>
                <button id="download-button">Download data</button>
            </div>
            <div id="progress-container">
                <label id="label-small" for="progress-bar">
                    <span id="download-label">Downloader ...</span>
                    <span id="timer-val">Vent ...</span>
                </label>
                <progress id="progress-bar" value="0" max="100"></progress>
                <div id="progress-val">0%</div>
            </div>
        </div>
        <div id="warnings"></div>
    </div>
    </body>
</html>
