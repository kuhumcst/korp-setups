<!DOCTYPE html>
<html>
    <head>
        <title>Download data</title>
        <style>
            #content {
                font-family: Helvetica, Arial;
                width: 500px;
                margin: 50px auto;
            }
            #download-section {
                display: flex;
                align-items: center;
            }
            #download-button {
                width: 115px;
                margin-right: 10px;
            }
            #progress-container {
                display: flex;
                display: none;
                align-items: center;
            }
            #label-small {
                width: 70px;
                font-size: 10px;
                margin-right: 5px;
            }
            #progress-val {
                font-size: 10px;
                width: 30px;
                text-align: right;
            }
            #warning {
                color: #400;
                background-color: #fcc;
                border: 1px solid #a00;
                border-radius: 3px;
                padding: 6px 10px;
                margin-top: 10px;
                font-size: 12px;
            }

            #progress-bar {
                border: 1px solid grey;
                height: 7px;
                width: 230px;
                box-sizing: border-box;
                border-radius: 4px;
                background-color: whitesmoke;
            }
            #progress-bar::-moz-progress-bar {
                background: #AAAAAA;
            }
            #progress-bar::-webkit-progress-bar {
                border-radius: 4px;
                background-color: whitesmoke;
            }
            #progress-bar::-webkit-progress-value {
                background-color: #AAAAAA;
            }

        </style>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
        <script src="{{ url_for('static', filename='filedownload.js') }}"></script>

        <script>
            $(document).ready(function() {
                // Set up websocket for listening for download progress - in the "status" namespace
                var socket = io.connect('http://' + document.domain + ':' + location.port + '/status');
                socket.on('connect', function() {
                    console.log('Connected to server');
                });

                socket.on('disconnect', function() {
                    console.log('Disconnected from server');
                });

                socket.on('error', function(error) {
                    console.error('Socket Error:', error);
                });

                // Add click event handler to download button
                $('#download-button').click(function() {
                    downloadButtonClick(socket);
                });
            });
        </script>



    </head>
    <body>
    <div id="content">
        <h1>Download data</h1>
        <div>
            <p>Klik her for at downloade. Der er 345 020 rækker, så downloaden vil tage en rum tid. Luk ikke dette vindue før downloaden er færdig.</p>
        </div>
        <div id="download-section">
            <div>
                <button id="download-button">Download data</button>
            </div>
            <div id="progress-container">
                <label id="label-small" for="progress-bar">Downloader ...</label>
                <progress id="progress-bar" value="0" max="100"></progress>
                <div id="progress-val">0%</div>
            </div>
        </div>
        <div id="warnings"></div>
    </div>
    </body>
</html>
