<!DOCTYPE html>
<html>
    <head>
        <title>Download data</title>
        <style>
            #content {
                font-family: Helvetica, Arial;
                width: 500px;
                margin: 50px auto;
            }
            #download-section {
                display: flex;
                align-items: center;
            }
            #download-button {
                width: 100px;
                margin-right: 10px;
            }
            #progress-container {
                display: flex;
                align-items: center;
                visibility: hidden;
            }
            #progress-bar-container {
                width: 250px;
                background-color: #f3f3f3;
                border: 1px solid #666;
                border-radius: 3px;
            }
            #label-small {
                font-size: 10px;
                margin-right: 5px;
            }
            #progress-bar {
                width: 0%;
                height: 5px;
                background-color: #aaaaaa;
            }
            #progress-bar-label {
                font-size: 10px;
                width: 30px;
                text-align: right;
            }
        </style>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
        <script src="{{ url_for('static', filename='filedownload.js') }}"></script>

        <script>
            $(document).ready(function() {
                // Set up websocket for listening for download progress - in the "status" namespace
                var socket = io.connect('http://' + document.domain + ':' + location.port + '/status');
                socket.on('connect', function() {
                    console.log('Connected to server');
                });

                socket.on('disconnect', function() {
                    console.log('Disconnected from server');
                });

                socket.on('error', function(error) {
                    console.error('Socket Error:', error);
                });

                // Add click event handler to download button
                $('#download-button').click(function() {
                    downloadButtonClick(socket);
                });
            });
        </script>



    </head>
    <body>
    <div id="content">
        <h1>Download data</h1>
        <div>
            <p>Klik her for at downloade. Der er 345 020 rækker, så downloaden vil tage en rum tid. Luk ikke dette vindue før downloaden er færdig.</p>
        </div>
        <div id="download-section">
            <div>
                <button id="download-button">Download fil</button>
            </div>
            <div id="progress-container">
                <div id="label-small">Formaterer data ...</div>
                <div id="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
                <div id="progress-bar-label">0%</div>
            </div>
        </div>
    </div>
    </body>
</html>
